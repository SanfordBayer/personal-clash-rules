# ✅ 1. 加回订阅链接配置中心 (记得把 URL 换成你自己的真实订阅)
proxy-providers:
  MySub:
    type: http
    url: "你的实际订阅链接粘贴到这里"
    interval: 3600
    path: ./proxies.yaml
    health-check:
      enable: true
      interval: 600
      url: https://www.gstatic.com/generate_204

# ✅ 2. 重构策略组 (修正 PikPak 位置与节点显示)
proxy-groups:
  - name: proxy
    type: select
    proxies:
      - autotest
      - failover
      - PikPak
      - HK
      - SG
      - JP
      - US
      - TW
      - Other
      - DIRECT

  - name: autotest
    type: url-test
    use: 
      - MySub
    filter: "^(?!.*(官网|套餐|流量|异常|剩余|过期|失效|维护|高倍|倍率|测试|Test|备用|到期|0\\.1x|内测|内网|loopback)).*$"
    url: https://www.gstatic.com/generate_204
    interval: 180
    tolerance: 30
    lazy: true

  - name: failover
    type: fallback
    use: 
      - MySub
    filter: "^(?!.*(官网|套餐|流量|异常|剩余|过期|失效|维护|高倍|倍率|测试|Test|备用|到期|0\\.1x|内测|内网|loopback)).*$"
    url: https://www.gstatic.com/generate_204
    interval: 180
    tolerance: 30
    lazy: true

  # 04 顺位：PikPak 专属组，合并展示常规控制组与所有具体节点
  - name: PikPak
    type: select
    use: 
      - MySub
    proxies:
      - proxy
      - autotest
      - failover
      - DIRECT

  - name: HK
    type: url-test
    use: 
      - MySub
    filter: "(?i)(香港|HK|Hong Kong|🇭🇰)"
    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    lazy: true

  - name: SG
    type: url-test
    use: 
      - MySub
    filter: "(?i)(新加坡|SG|Singapore|🇸🇬)"
    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    lazy: true

  - name: JP
    type: url-test
    use: 
      - MySub
    filter: "(?i)(日本|JP|Japan|🇯🇵)"
    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    lazy: true

  - name: US
    type: url-test
    use: 
      - MySub
    filter: "(?i)(美国|US|United States|🇺🇸)"
    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    lazy: true

  - name: TW
    type: url-test
    use: 
      - MySub
    filter: "(?i)(台湾|TW|Tai Wan|🇹🇼)"
    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    lazy: true

  - name: Other
    type: url-test
    use: 
      - MySub
    filter: "^(?!.*(新加坡|SG|香港|HK|日本|JP|美国|US|台湾|TW|官网|套餐|流量|异常|剩余|过期|失效|维护|高倍|倍率|测试|Test|备用|到期)).*$"
    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    lazy: true

  - name: direct
    type: select
    proxies:
      - DIRECT

  - name: reject
    type: select
    proxies:
      - REJECT

  - name: catchall
    type: select
    proxies:
      - proxy
      - autotest
      - DIRECT

  - name: GLOBAL
    type: select
    proxies:
      - DIRECT
      - proxy
      - autotest

# ✅ 3. 路由规则更新
rules:
  - DOMAIN-KEYWORD,stun,REJECT
  - DOMAIN-KEYWORD,turn,REJECT
  - AND,((NETWORK,UDP),(DST-PORT,443),(GEOIP,!CN)),REJECT

  # PikPak 专属规则指派
  - PROCESS-NAME,PikPak.exe,PikPak
  - PROCESS-NAME,com.pikpak.app,PikPak

  # Telegram 流量统一走全局 proxy 即可
  - DOMAIN-SUFFIX,telegram.org,proxy
  - DOMAIN-SUFFIX,telegram.me,proxy
  - DOMAIN-KEYWORD,telegram,proxy
  - IP-CIDR,91.108.0.0/16,proxy,no-resolve
  - IP-CIDR,149.154.160.0/20,proxy,no-resolve
  - IP-CIDR6,2001:67c:4e8::/48,proxy,no-resolve

  - GEOIP,LAN,direct,no-resolve
  - GEOIP,CN,direct,no-resolve
  - MATCH,catchall
