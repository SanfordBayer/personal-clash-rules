# Mihomo / Clash.Meta Regional Profile
# Features: Numerical UI Lock, PikPak Prioritized (Index 04), Removed TG Group
# Optimized for: Clash Verge Rev, FlClash

# 基础全局配置
ipv6: true
tcp-concurrent: true

# TUN 模式配置
tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - "0.0.0.0:53"
  strict-route: true

# 嗅探器配置
sniffer:
  enable: true
  parse-pure-ip: true
  sniff:
    TLS:
      ports: [443, 8443]
      override-destination: true
    HTTP:
      ports: [80, 8080]
      override-destination: true
    QUIC:
      ports: [443]

# DNS 增强配置 (使用脚本同款 Fake-IP 及内外分流)
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: true
  enhanced-mode: fake-ip
  respect-rules: true
  proxy-server-nameserver:
    - https://doh.pub/dns-query
    - https://dns.alidns.com/dns-query
    - 223.5.5.5
  nameserver-policy:
    "geosite:cn,private":
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query
    "geosite:geolocation-!cn":
      - https://1.1.1.1/dns-query
      - https://8.8.4.4/dns-query
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://dns.alidns.com/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.4.4/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN

# 远程规则集
rule-providers:
  reject:
    type: http
    format: yaml
    interval: 86400
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt"
  pikpak:
    type: http
    format: yaml
    interval: 86400
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/pikpak.txt"
  proxy:
    type: http
    format: yaml
    interval: 86400
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/proxy.txt"
  direct:
    type: http
    format: yaml
    interval: 86400
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.txt"
  gfw:
    type: http
    format: yaml
    interval: 86400
    behavior: domain
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/gfw.txt"
  cncidr:
    type: http
    format: yaml
    interval: 86400
    behavior: ipcidr
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/cncidr.txt"
  lancidr:
    type: http
    format: yaml
    interval: 86400
    behavior: ipcidr
    url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/lancidr.txt"

# 节点列表（请在此处粘贴或通过订阅生成你的节点）
proxies:
  # - name: "香港 01"
  #   type: ss
  #   ...

# 策略组配置
proxy-groups:
  # 01 | Proxy 核心选路
  - name: "01 | Proxy"
    type: select
    proxies:
      - "02 | AutoTest"
      - "03 | FailOver"
      - "05 | HK"
      - "06 | SG"
      - "07 | JP"
      - "08 | US"
      - "09 | TW"
      - "10 | Other"
      - DIRECT
    include-all: true
    filter: "^(?!.*(官网|套餐|流量|异常|剩余|过期|失效|维护|高倍|倍率|测试|Test|备用|到期|0\\.1x|内测|内网|loopback)).*$"

  # 02 | 自动延迟测试
  - name: "02 | AutoTest"
    type: url-test
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    timeout: 5000
    lazy: true
    tolerance: 200
    include-all: true
    filter: "^(?!.*(官网|套餐|流量|异常|剩余|过期|失效|维护|高倍|倍率|测试|Test|备用|到期)).*$"

  # 03 | 故障转移
  - name: "03 | FailOver"
    type: fallback
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    timeout: 5000
    lazy: true
    include-all: true
    filter: "^(?!.*(官网|套餐|流量|异常|剩余|过期|失效|维护|高倍|倍率|测试|Test|备用|到期)).*$"

  # 04 | PikPak (独立策略组，展示所有有效节点，SG 和 Proxy 置顶)
  - name: "04 | PikPak"
    type: select
    proxies:
      - "06 | SG"
      - "01 | Proxy"
      - DIRECT
    include-all: true
    filter: "^(?!.*(官网|套餐|流量|异常|剩余|过期|失效|维护|高倍|倍率|测试|Test|备用|到期|0\\.1x|内测|内网|loopback)).*$"

  # 05 | 香港
  - name: "05 | HK"
    type: url-test
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    timeout: 5000
    lazy: true
    include-all: true
    filter: "(?=.*(香港|HK|Hong Kong|🇭)).*$"

  # 06 | 新加坡
  - name: "06 | SG"
    type: url-test
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    timeout: 5000
    lazy: true
    include-all: true
    filter: "(?=.*(新加坡|SG|Singapore|🇸🇬)).*$"

  # 07 | 日本
  - name: "07 | JP"
    type: url-test
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    timeout: 5000
    lazy: true
    include-all: true
    filter: "(?=.*(日本|JP|Japan|🇯🇵)).*$"

  # 08 | 美国
  - name: "08 | US"
    type: url-test
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    timeout: 5000
    lazy: true
    include-all: true
    filter: "(?=.*(美国|US|United States|🇺🇸)).*$"

  # 09 | 台湾
  - name: "09 | TW"
    type: url-test
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    timeout: 5000
    lazy: true
    include-all: true
    filter: "(?=.*(台湾|TW|Tai Wan|🇹)).*$"

  # 10 | 其他地区
  - name: "10 | Other"
    type: url-test
    url: "https://www.gstatic.com/generate_204"
    interval: 300
    timeout: 5000
    lazy: true
    include-all: true
    filter: "^(?!.*(香港|HK|Hong Kong|🇭|新加坡|SG|Singapore|🇸🇬|日本|JP|Japan|🇯🇵|美国|US|United States|🇺🇸|台湾|TW|Tai Wan|🇹|官网|套餐|流量|异常|剩余|过期|失效|维护|高倍|倍率|测试|Test|备用|到期)).*$"

  # 功能辅助组
  - name: "11 | Direct"
    type: select
    proxies:
      - DIRECT

  - name: "12 | Reject"
    type: select
    proxies:
      - REJECT
      - DIRECT

  - name: "13 | CatchAll"
    type: select
    proxies:
      - "01 | Proxy"
      - "02 | AutoTest"
      - DIRECT

  - name: "14 | GLOBAL"
    type: select
    proxies:
      - DIRECT
      - "01 | Proxy"

# 路由规则
rules:
  # QUIC 拦截 (海外拒绝)
  - AND,((NETWORK,UDP),(DST-PORT,443),(GEOIP,!CN)),REJECT
  
  # 进程分流
  - PROCESS-NAME,Telegram.exe,01 | Proxy
  - PROCESS-NAME,PikPak.exe,04 | PikPak
  
  # 规则集与关键词匹配
  - RULE-SET,reject,12 | Reject
  - RULE-SET,pikpak,04 | PikPak
  - DOMAIN-KEYWORD,telegram,01 | Proxy
  - IP-CIDR,91.108.0.0/16,01 | Proxy,no-resolve
  - RULE-SET,proxy,01 | Proxy
  - RULE-SET,gfw,01 | Proxy
  - RULE-SET,direct,11 | Direct
  
  # 局域网与国内绕过
  - GEOIP,LAN,11 | Direct,no-resolve
  - GEOIP,CN,11 | Direct,no-resolve
  
  # 漏网之鱼
  - MATCH,13 | CatchAll
