proxy-groups:
  - name: proxy
    type: select
    proxies:
      - autotest
      - failover
      - PikPak
      - HK
      - SG
      - JP
      - US
      - TW
      - Other
      - DIRECT

  - name: autotest
    type: url-test
    use: 
      - TemplateSub
    proxies:
      - DIRECT  # 👈 核心修复：加入兜底直连，防止空包崩溃
    filter: "^(?!.*(官网|套餐|流量|异常|剩余|过期|失效|维护|高倍|倍率|测试|Test|备用|到期|0\\.1x|内测|内网|loopback)).*$"
    url: https://www.gstatic.com/generate_204
    interval: 180
    tolerance: 30
    lazy: true

  - name: failover
    type: fallback
    use: 
      - TemplateSub
    proxies:
      - DIRECT  # 👈 兜底直连
    filter: "^(?!.*(官网|套餐|流量|异常|剩余|过期|失效|维护|高倍|倍率|测试|Test|备用|到期|0\\.1x|内测|内网|loopback)).*$"
    url: https://www.gstatic.com/generate_204
    interval: 180
    tolerance: 30
    lazy: true

  - name: PikPak
    type: select
    use: 
      - TemplateSub
    proxies:
      - proxy
      - autotest
      - failover
      - DIRECT

  - name: HK
    type: url-test
    use: 
      - TemplateSub
    proxies:
      - DIRECT  # 👈 兜底直连
    filter: "(?i)(香港|HK|Hong Kong|🇭🇰)"
    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    lazy: true

  - name: SG
    type: url-test
    use: 
      - TemplateSub
    proxies:
      - DIRECT  # 👈 兜底直连
    filter: "(?i)(新加坡|SG|Singapore|🇸🇬)"
    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    lazy: true

  - name: JP
    type: url-test
    use: 
      - TemplateSub
    proxies:
      - DIRECT  # 👈 兜底直连
    filter: "(?i)(日本|JP|Japan|🇯🇵)"
    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    lazy: true

  - name: US
    type: url-test
    use: 
      - TemplateSub
    proxies:
      - DIRECT  # 👈 兜底直连
    filter: "(?i)(美国|US|United States|🇺🇸)"
    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    lazy: true

  - name: TW
    type: url-test
    use: 
      - TemplateSub
    proxies:
      - DIRECT  # 👈 兜底直连
    filter: "(?i)(台湾|TW|Tai Wan|🇹🇼)"
    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    lazy: true

  - name: Other
    type: url-test
    use: 
      - TemplateSub
    proxies:
      - DIRECT  # 👈 兜底直连
    filter: "^(?!.*(新加坡|SG|香港|HK|日本|JP|美国|US|台湾|TW|官网|套餐|流量|异常|剩余|过期|失效|维护|高倍|倍率|测试|Test|备用|到期)).*$"
    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    lazy: true

  - name: direct
    type: select
    proxies:
      - DIRECT

  - name: reject
    type: select
    proxies:
      - REJECT

  - name: catchall
    type: select
    proxies:
      - proxy
      - autotest
      - DIRECT

  - name: GLOBAL
    type: select
    proxies:
      - DIRECT
      - proxy
      - autotest
