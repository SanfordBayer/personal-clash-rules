# Clash Meta Blank Configuration Template
# Compatible: Mihomo >= v1.18.0
# Status: Ready to use (DIRECT only, no proxies)

mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: true
tcp-concurrent: false

# TUN Mode (Optional - disable if not needed)
tun:
  enable: false
  stack: gvisor
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - "any:53"
  strict-route: false
  mtu: 1500

# DNS Configuration
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "localhost.ptlogin2.qq.com"
    - "time.*.com"
    - "stun.*.*"
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://dns.alidns.com/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.4.4/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN

# Sniffer (Optional)
sniffer:
  enable: false
  parse-pure-ip: true
  force-dns-mapping: true
  sniff:
    TLS:
      ports: [443, 8443]
      override-destination: true

# Proxy Providers (Empty - add your subscription here)
proxy-providers:
  # Example:
  # MySubscription:
  #   type: http
  #   url: "YOUR_SUBSCRIPTION_URL"
  #   interval: 3600
  #   path: ./proxies.yaml
  #   health-check:
  #     enable: true
  #     interval: 600
  #     url: https://www.gstatic.com/generate_204

# Proxy Groups (Minimal - DIRECT only)
proxy-groups:
  - name: Proxy
    type: select
    proxies:
      - DIRECT

  - name: Telegram
    type: select
    proxies:
      - Proxy
      - DIRECT

  - name: GLOBAL
    type: select
    proxies:
      - DIRECT
      - Proxy

# Rule Providers (Optional - comment out if not needed)
rule-providers:
  # reject:
  #   type: http
  #   behavior: domain
  #   url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt"
  #   path: ./ruleset/reject.yaml
  #   interval: 86400
  # proxy:
  #   type: http
  #   behavior: domain
  #   url: "https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/proxy.txt"
  #   path: ./ruleset/proxy.yaml
  #   interval: 86400

# Rules (Basic)
rules:
  # Telegram
  - DOMAIN-SUFFIX,telegram.org,Telegram
  - DOMAIN-SUFFIX,telegram.me,Telegram
  - DOMAIN-KEYWORD,telegram,Telegram

  # Direct
  - GEOIP,CN,DIRECT
  - GEOIP,LAN,DIRECT

  # Fallback
  - MATCH,Proxy
