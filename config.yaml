# Clash.Meta Config v1.1.4 - Optimized for ClashMi iOS

mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: true
external-controller: 0.0.0.0:9090
tcp-concurrent: true

tun:
  enable: true
  stack: gvisor
  dns-hijack: ["any:53"]
  auto-route: true
  auto-detect-interface: true

sniffer:
  enable: true
  parse-pure-ip: true
  force-dns-mapping: true
  sniff:
    TLS:
      ports: [443, 8443]
      override-destination: true

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "+.apple.com"
    - "+.icloud.com"
    - "time.*.com"
    - "stun.*.*"
    - "geosite:cn"
  nameserver:
    - https://dns.alidns.com/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.4.4/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
  nameserver-policy:
    "geosite:cn,private": ["https://doh.pub/dns-query", "https://dns.alidns.com/dns-query"]
    "geosite:geolocation-!cn": ["https://1.1.1.1/dns-query", "https://8.8.4.4/dns-query"]

rule-providers:
  reject:
    type: http
    behavior: domain
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt
    interval: 86400
  proxy:
    type: http
    behavior: domain
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/proxy.txt
    interval: 86400
  direct:
    type: http
    behavior: domain
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.txt
    interval: 86400
  gfw:
    type: http
    behavior: domain
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/gfw.txt
    interval: 86400
  cncidr:
    type: http
    behavior: ipcidr
    url: https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/cncidr.txt
    interval: 86400

proxies: []

proxy-groups:
  - name: Proxy
    type: select
    include-all: true
    proxies:
      - AutoTest
      - Failover
      - HK
      - SG
      - JP
      - US
      - TW
      - Other
      - DIRECT

  - name: AutoTest
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 180
    tolerance: 30
    include-all: true
    filter: "^(?!.*(官网|套餐|流量|异常|剩余|过期|失效|维护|高倍|倍率|测试|Test|备用|到期)).*$"

  - name: Failover
    type: fallback
    url: http://www.gstatic.com/generate_204
    interval: 180
    tolerance: 30
    include-all: true
    filter: "^(?!.*(官网|套餐|流量|异常|剩余|过期|失效|维护|高倍|倍率|测试|Test|备用|到期)).*$"

  - name: HK
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    include-all: true
    filter: "(?i)(香港|HK|Hong Kong)"

  - name: SG
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    include-all: true
    filter: "(?i)(新加坡|SG|Singapore)"

  - name: JP
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    include-all: true
    filter: "(?i)(日本|JP|Japan)"

  - name: US
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    include-all: true
    filter: "(?i)(美国|US|United States)"

  - name: TW
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    include-all: true
    filter: "(?i)(台湾|TW|Taiwan)"

  - name: Other
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    include-all: true
    filter: "^(?!.*(香港|HK|新加坡|SG|日本|JP|美国|US|台湾|TW|官网|套餐|流量|异常|剩余|过期|失效|维护|高倍|倍率|测试|Test|备用|到期)).*$"

  - name: Direct
    type: select
    proxies: [DIRECT, Proxy]

  - name: Reject
    type: select
    proxies: [REJECT, DIRECT]

  - name: CatchAll
    type: select
    proxies: [Proxy, AutoTest, DIRECT]

  - name: GLOBAL
    type: select
    proxies: [DIRECT, Proxy, AutoTest]

rules:
  - DOMAIN-KEYWORD,stun,REJECT
  - DOMAIN-KEYWORD,turn,REJECT
  - AND,((NETWORK,UDP),(DST-PORT,19302)),REJECT
  - AND,((NETWORK,UDP),(DST-PORT,443),(GEOIP,!CN)),REJECT
  - RULE-SET,reject,Reject
  - RULE-SET,proxy,Proxy
  - RULE-SET,gfw,Proxy
  - RULE-SET,direct,Direct
  - RULE-SET,cncidr,Direct
  - GEOIP,CN,Direct
  - MATCH,CatchAll

profile:
  store-selected: true
  store-fake-ip: true
