# ==========================================
# Clash 远程配置模板
# 适用于 Sub-Store 等订阅管理工具
# ==========================================

# --- 基础设置 ---
mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: false
external-controller: 0.0.0.0:9090
external-ui: dashboard

# --- 代理节点配置 ---
# 使用模板变量，将在渲染时替换为实际节点
proxies:
  %proxies%

# --- 策略组配置 ---
proxy-groups:
  # 主策略组 - 自动选择最优节点
  - name: 🚀 节点选择
    type: select
    proxies:
      %primary_strategy_chain%

  # 地区策略组 - 按地理位置分组
  - name: 🌏 地区选择
    type: select
    proxies:
      %region_strategy_chain%

  # 协议策略组 - 按协议类型分组
  - name: 🔄 协议选择
    type: select
    proxies:
      %protocol_strategy_chain%

  # 所有策略组集合
  %all_strategy_groups%

  # 备用策略组 - 故障转移
  - name: ⚡ 自动切换
    type: fallback
    url: https://www.gstatic.com/generate_204
    interval: 300
    tolerance: 50
    proxies:
      %primary_strategy_chain%

  # 直连策略
  - name:  全球直连
    type: select
    proxies:
      - DIRECT
      -  节点选择

  # 广告拦截
  - name: 🛑 广告拦截
    type: select
    proxies:
      - REJECT
      - DIRECT

# --- DNS 配置 ---
dns:
  enable: true
  listen: 0.0.0.0:53
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - '*.lan'
    - '*.local'
    - '+.apple.com'
    - '+.icloud.com'
    - 'time.*.com'
    - 'stun.*.*'
  nameserver:
    - https://dns.alidns.com/dns-query
    - https://doh.pub/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.8.8/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN

# --- 规则配置 ---
# 使用模板变量，将在渲染时替换为实际规则
rules:
  %rules%

# --- 其他配置 ---
# 配置文件元信息（用于标识）
# 文件名: %file_name%
# 目标格式: %target_format%
# 节点数量: %node_count%

# --- 分组明细信息（注释说明）---
# 地区策略组名称列表: %region_group_names%
# 地区策略组节点数量: %region_group_counts%
# 地区策略组逐行清单: %region_group_list%
# 协议策略组名称列表: %protocol_group_names%
# 协议策略组节点数量: %protocol_group_counts%
# 协议策略组逐行清单: %protocol_group_list%
