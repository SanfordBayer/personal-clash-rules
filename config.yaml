# ==========================================
# Clash Template with Placeholder Support
# Version: 1.0.9
# ==========================================

mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: true
external-controller: 0.0.0.0:9090
tcp-concurrent: true

# --- Metadata Comments ---
# Filename: <%fileName%>
# Interval: <%interval%>
# Managed Config URL: <%managedConfigUrl%>
# Target Format: <%targetFormat%>
# Node Count: <%nodeCount%>

proxies:
<%proxies%>

proxy-groups:
  - name: Proxy
    type: select
    proxies:
      - AutoTest
      - Failover
<%regionGroupNames%>
      - DIRECT

  - name: AutoTest
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: <%interval%>
    tolerance: 30
    proxies:
<%regionGroupNames%>

  - name: Failover
    type: fallback
    url: http://www.gstatic.com/generate_204
    interval: <%interval%>
    tolerance: 30
    proxies:
<%regionGroupNames%>

  - name: Telegram
    type: select
    proxies:
<%regionGroupNames%>
      - AutoTest
      - Failover
      - Proxy
      - DIRECT

  - name: PikPak
    type: select
    proxies:
<%regionGroupNames%>
      - AutoTest
      - Failover
      - Proxy
      - DIRECT

  - name: Direct
    type: select
    proxies:
      - DIRECT
      - Proxy

  - name: Reject
    type: select
    proxies:
      - REJECT
      - DIRECT

  - name: CatchAll
    type: select
    proxies:
      - Proxy
      - AutoTest
      - DIRECT

  - name: GLOBAL
    type: select
    proxies:
      - DIRECT
      - Proxy
      - AutoTest

rules:
<%rules%>
