# Clash Meta Configuration v1.0.1
# Standalone version - No external subscription dependency
# Compatible: Mihomo >= v1.18.0

mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: true
tcp-concurrent: false

# TUN Mode (Disabled by default for stability)
tun:
  enable: false
  stack: gvisor
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - "any:53"
  strict-route: false
  mtu: 1500

# DNS Configuration
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "localhost.ptlogin2.qq.com"
    - "time.*.com"
    - "stun.*.*"
    - "+.srv.nintendo.net"
    - "+.stun.playstation.net"
    - "+.xboxlive.com"
    - "geosite:cn"
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - 2400:3200::1
  nameserver:
    - https://dns.alidns.com/dns-query
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://1.1.1.1/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.4.4/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN
  nameserver-policy:
    "geosite:cn,private":
      - https://doh.pub/dns-query
      - https://dns.alidns.com/dns-query
    "geosite:geolocation-!cn":
      - https://1.1.1.1/dns-query
      - https://8.8.4.4/dns-query

# Sniffer (Disabled for stability)
sniffer:
  enable: false
  parse-pure-ip: true
  force-dns-mapping: true
  sniff:
    TLS:
      ports: [443, 8443]
      override-destination: true
    QUIC:
      ports: [443, 8443]

# ✅ FIX: Remove proxy-providers (no external dependency)
# If you have nodes, add them manually in the "proxies" section below

# Manual Proxies Section (Empty by default - add your nodes here)
proxies: []
  # Example node format:
  # - name: "HK-01"
  #   type: vmess
  #   server: example.com
  #   port: 443
  #   uuid: your-uuid-here
  #   alterId: 0
  #   cipher: auto
  #   tls: true
  #   udp: true
  #   xudp: true

# ✅ FIX: Use "proxies" instead of "use" to avoid subscription dependency
proxy-groups:
  - name: proxy
    type: select
    # ✅ Always include DIRECT as fallback
    proxies:
      - autotest
      - failover
      - HK
      - SG
      - JP
      - US
      - TW
      - Other
      - DIRECT

  - name: autotest
    type: url-test
    # ✅ Use explicit proxies list instead of provider
    proxies: []  # Will be populated from "proxies" section
    filter: "^(?!.*(官网|套餐|流量|异常|剩余|过期|失效|维护|高倍|倍率|测试|Test|备用|到期|0\\.1x|内测|内网|loopback)).*$"
    url: https://www.gstatic.com/generate_204
    interval: 180
    tolerance: 30
    lazy: true

  - name: failover
    type: fallback
    proxies: []
    filter: "^(?!.*(官网|套餐|流量|异常|剩余|过期|失效|维护|高倍|倍率|测试|Test|备用|到期|0\\.1x|内测|内网|loopback)).*$"
    url: https://www.gstatic.com/generate_204
    interval: 180
    tolerance: 30
    lazy: true

  - name: HK
    type: url-test
    proxies: []
    filter: "(?i)(香港|HK|Hong Kong|🇭🇰)"
    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    lazy: true

  - name: SG
    type: url-test
    proxies: []
    filter: "(?i)(新加坡|SG|Singapore|🇸🇬)"
    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    lazy: true

  - name: JP
    type: url-test
    proxies: []
    filter: "(?i)(日本|JP|Japan|🇯)"
    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    lazy: true

  - name: US
    type: url-test
    proxies: []
    filter: "(?i)(美国|US|United States|🇺🇸)"
    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    lazy: true

  - name: TW
    type: url-test
    proxies: []
    filter: "(?i)(台湾|TW|Tai Wan|🇹🇼)"
    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    lazy: true

  - name: Other
    type: url-test
    proxies: []
    filter: "^(?!.*(新加坡|SG|香港|HK|日本|JP|美国|US|台湾|TW|官网|套餐|流量|异常|剩余|过期|失效|维护|高倍|倍率|测试|Test|备用|到期)).*$"
    url: https://www.gstatic.com/generate_204
    interval: 600
    tolerance: 100
    lazy: true

  - name: telegram
    type: select
    proxies:
      - proxy
      - HK
      - SG
      - JP
      - US
      - TW
      - Other
      - autotest
      - DIRECT

  - name: pikpak
    type: select
    proxies:
      - proxy
      - HK
      - SG
      - JP
      - US
      - TW
      - Other
      - autotest
      - DIRECT

  - name: direct
    type: select
    proxies:
      - DIRECT

  - name: reject
    type: select
    proxies:
      - REJECT

  - name: catchall
    type: select
    proxies:
      - proxy
      - autotest
      - DIRECT

  - name: GLOBAL
    type: select
    proxies:
      - DIRECT
      - proxy
      - autotest

