# Clash Meta Configuration v1.0.7 - Ultimate Fallback
# 核心目标：100% 通过 Clash Mi 内核校验，绝对不报错，绝对能启动。
# 兼容：Mihomo >= v1.18.0, Clash Mi, Clash Verge

mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: false
tcp-concurrent: false

# 1. 关闭 TUN (防止苹果/安卓权限报错)
tun:
  enable: false

# 2. 基础 DNS (防泄露)
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "*.lan"
    - "*.local"
    - "+.msftconnecttest.com"
    - "time.*.com"
    - "stun.*.*"
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
  nameserver:
    - https://dns.alidns.com/dns-query
  # 关键：必须配置 proxy-server-nameserver 防止内核校验报错
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://1.1.1.1/dns-query
  fallback:
    - https://1.1.1.1/dns-query
    - https://8.8.4.4/dns-query
  fallback-filter:
    geoip: true
    geoip-code: CN

# 3. 节点区域 (留空，依赖订阅导入或手动添加)
# 如果订阅失效，这里为空也不会导致崩溃，因为有 DIRECT 保底
proxies: []

# 4. 策略组 (绝对防御架构)
# 原则：
# 1. 全部使用 select 类型 (最安全，不测速，不报空节点错)
# 2. 每个组必须包含 DIRECT (防止空组校验失败)
# 3. 严禁循环引用 (proxy 组绝不包含 telegram/pikpak)
proxy-groups:
  # 主策略组：只包含底层节点组和 DIRECT
  - name: proxy
    type: select
    proxies:
      - HK
      - SG
      - JP
      - US
      - TW
      - Other
      - DIRECT

  # 地区组：使用 select，包含 DIRECT 保底
  - name: HK
    type: select
    proxies:
      - DIRECT
  - name: SG
    type: select
    proxies:
      - DIRECT
  - name: JP
    type: select
    proxies:
      - DIRECT
  - name: US
    type: select
    proxies:
      - DIRECT
  - name: TW
    type: select
    proxies:
      - DIRECT
  - name: Other
    type: select
    proxies:
      - DIRECT

  # 应用组：引用 proxy (单向依赖，防循环)
  - name: telegram
    type: select
    proxies:
      - proxy
      - HK
      - SG
      - JP
      - US
      - TW
      - DIRECT

  - name: pikpak
    type: select
    proxies:
      - proxy
      - HK
      - SG
      - JP
      - US
      - TW
      - DIRECT

  # 兜底组
  - name: direct
    type: select
    proxies:
      - DIRECT
  - name: reject
    type: select
    proxies:
      - REJECT
      - DIRECT
  - name: catchall
    type: select
    proxies:
      - proxy
      - direct

# 5. 规则 (绝对不使用 RULE-SET，全部用内置规则，组名严格小写)
rules:
  # WebRTC 拦截
  - DOMAIN-KEYWORD,stun,reject
  - DOMAIN-KEYWORD,turn,reject

  # Telegram 路由
  - DOMAIN-SUFFIX,telegram.org,telegram
  - DOMAIN-SUFFIX,telegram.me,telegram
  - DOMAIN-KEYWORD,telegram,telegram
  - IP-CIDR,91.108.0.0/16,telegram,no-resolve
  - IP-CIDR,149.154.160.0/20,telegram,no-resolve
  - IP-CIDR6,2001:67c:4e8::/48,telegram,no-resolve

  # 直连规则
  - GEOIP,CN,direct,no-resolve
  - GEOIP,LAN,direct,no-resolve

  # 兜底
  - MATCH,catchall
