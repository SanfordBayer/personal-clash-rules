# Clash.Meta Config v1.1.12-test - App Groups Test (No Loop Reference)

mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: false
external-controller: 0.0.0.0:9090
tcp-concurrent: true

tun:
  enable: true
  stack: gvisor
  dns-hijack: []
  auto-route: true
  auto-detect-interface: true

sniffer:
  enable: true
  parse-pure-ip: true
  force-dns-mapping: true
  sniff:
    TLS:
      ports: [443, 8443]
      override-destination: true

dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  respect-rules: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "localhost.ptlogin2.qq.com"
    - "localhost.sec.qq.com"
    - "+.in-addr.arpa"
    - "+.ip6.arpa"
    - "time.*.com"
    - "time.*.gov"
    - "pool.ntp.org"
    - "localhost.work.weixin.qq.com"
  default-nameserver:
    - 223.5.5.5
    - 1.2.4.8
  nameserver:
    - https://1.1.1.1/dns-query
    - https://8.8.4.4/dns-query
  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query
  direct-nameserver:
    - https://223.5.5.5/dns-query
    - https://doh.pub/dns-query
  nameserver-policy:
    "geosite:cn,private":
      - https://223.5.5.5/dns-query
      - https://doh.pub/dns-query

rule-providers:
  reject:
    type: http
    behavior: domain
    url: https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt
    interval: 86400
  pikpak:
    type: http
    behavior: domain
    url: https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/pikpak.txt
    interval: 86400
  proxy:
    type: http
    behavior: domain
    url: https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/proxy.txt
    interval: 86400
  direct:
    type: http
    behavior: domain
    url: https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.txt
    interval: 86400
  gfw:
    type: http
    behavior: domain
    url: https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/gfw.txt
    interval: 86400
  cncidr:
    type: http
    behavior: ipcidr
    url: https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/cncidr.txt
    interval: 86400
  lancidr:
    type: http
    behavior: ipcidr
    url: https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/lancidr.txt
    interval: 86400
  telegramcidr:
    type: http
    behavior: ipcidr
    url: https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/telegramcidr.txt
    interval: 86400

proxies: []

proxy-groups:
  - name: "[01] Proxy"
    type: select
    include-all: true
    proxies:
      - "[02] AutoTest"
      - "[03] Failover"
      - "[10] Telegram"
      - "[11] PikPak"
      - "[04] HK"
      - "[05] SG"
      - "[06] JP"
      - "[07] US"
      - "[08] TW"
      - "[09] Other"

  - name: "[02] AutoTest"
    type: url-test
    url: https://www.google.com/generate_204
    interval: 120
    timeout: 3000
    tolerance: 50
    include-all: true
    filter: "^(?!.*(官网|套餐|流量|异常|剩余|过期|失效|维护|高倍|倍率|测试|Test|备用|到期)).*$"

  - name: "[03] Failover"
    type: fallback
    url: https://www.google.com/generate_204
    interval: 120
    timeout: 3000
    include-all: true
    filter: "^(?!.*(官网|套餐|流量|异常|剩余|过期|失效|维护|高倍|倍率|测试|Test|备用|到期)).*$"

  - name: "[04] HK"
    type: url-test
    url: https://www.google.com/generate_204
    interval: 300
    timeout: 3000
    tolerance: 100
    include-all: true
    filter: "(?i)(香港|HK|Hong Kong)"

  - name: "[05] SG"
    type: url-test
    url: https://www.google.com/generate_204
    interval: 300
    timeout: 3000
    tolerance: 100
    include-all: true
    filter: "(?i)(新加坡|SG|Singapore)"

  - name: "[06] JP"
    type: url-test
    url: https://www.google.com/generate_204
    interval: 300
    timeout: 3000
    tolerance: 100
    include-all: true
    filter: "(?i)(日本|JP|Japan)"

  - name: "[07] US"
    type: url-test
    url: https://www.google.com/generate_204
    interval: 300
    timeout: 3000
    tolerance: 100
    include-all: true
    filter: "(?i)(美国|US|United States)"

  - name: "[08] TW"
    type: url-test
    url: https://www.google.com/generate_204
    interval: 300
    timeout: 3000
    tolerance: 100
    include-all: true
    filter: "(?i)(台湾|TW|Taiwan)"

  - name: "[09] Other"
    type: url-test
    url: https://www.google.com/generate_204
    interval: 300
    timeout: 3000
    tolerance: 100
    include-all: true
    filter: "^(?!.*(香港|HK|新加坡|SG|日本|JP|美国|US|台湾|TW|官网|套餐|流量|异常|剩余|过期|失效|维护|高倍|倍率|测试|Test|备用|到期)).*$"

  # ==========================================
  # 应用策略组 (测试版)
  # 核心防循环机制：此处绝对不包含 "[01] Proxy"
  # ==========================================
  - name: "[10] Telegram"
    type: select
    include-all: true
    filter: "^(?!.*(官网|套餐|流量|异常|剩余|过期|失效|维护|高倍|倍率|测试|Test|备用|到期)).*$"
    proxies:
      - "[04] HK"
      - "[05] SG"
      - "[06] JP"
      - "[07] US"
      - "[08] TW"
      - "[09] Other"
      - "[02] AutoTest"
      - "[03] Failover"
      - DIRECT

  - name: "[11] PikPak"
    type: select
    include-all: true
    filter: "^(?!.*(官网|套餐|流量|异常|剩余|过期|失效|维护|高倍|倍率|测试|Test|备用|到期)).*$"
    proxies:
      - "[04] HK"
      - "[05] SG"
      - "[06] JP"
      - "[07] US"
      - "[08] TW"
      - "[09] Other"
      - "[02] AutoTest"
      - "[03] Failover"
      - DIRECT
  # ==========================================

  - name: "[12] Direct"
    type: select
    proxies: [DIRECT, "[01] Proxy"]

  - name: "[13] Reject"
    type: select
    proxies: [REJECT, DIRECT]

  - name: "[14] CatchAll"
    type: select
    proxies: ["[01] Proxy", "[02] AutoTest", DIRECT]

  - name: "[15] GLOBAL"
    type: select
    proxies: [DIRECT, "[01] Proxy", "[02] AutoTest"]

rules:
  - DOMAIN-KEYWORD,stun,REJECT
  - DOMAIN-KEYWORD,turn,REJECT
  - AND,((NETWORK,UDP),(DST-PORT,19302)),REJECT
  - AND,((NETWORK,UDP),(DST-PORT,443),(GEOIP,!CN)),REJECT
  
  # 应用进程路由规则
  - PROCESS-NAME,Telegram.exe,[10] Telegram
  - PROCESS-NAME,Telegram,[10] Telegram
  - PROCESS-NAME,com.tdesktop.Telegram,[10] Telegram
  - PROCESS-NAME,PikPak.exe,[11] PikPak
  - PROCESS-NAME,com.pikpak.app,[11] PikPak
  
  # 规则集
  - RULE-SET,reject,[13] Reject
  - RULE-SET,pikpak,[11] PikPak
  - RULE-SET,proxy,[01] Proxy
  - RULE-SET,gfw,[01] Proxy
  - RULE-SET,direct,[12] Direct
  - RULE-SET,lancidr,[12] Direct,no-resolve
  - RULE-SET,cncidr,[12] Direct,no-resolve
  - RULE-SET,telegramcidr,[10] Telegram,no-resolve
  - GEOIP,CN,[12] Direct,no-resolve
  - MATCH,[14] CatchAll

profile:
  store-selected: true
  store-fake-ip: true
