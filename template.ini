[custom]
udp=true
tfo=true
sort=true
exclude_remarks=(官网|套餐|流量|异常|剩余|过期|失效|维护|高倍|倍率|测试|Test|备用|到期|0\.1x|内测|内网|loopback)

; ==========================================
; 策略组定义 (注意排版顺序与末尾的 DIRECT 兜底)
; ==========================================

; 01. 代理主控 (已按优先级排列)
custom_proxy_group=proxy`select`autotest`failover`PikPak`HK`SG`JP`US`TW`Other`DIRECT

; 02-03. 测速主组 (追加 DIRECT 兜底防止空包)
custom_proxy_group=autotest`url-test`.*`https://www.gstatic.com/generate_204`180`30`DIRECT
custom_proxy_group=failover`fallback`.*`https://www.gstatic.com/generate_204`180`30`DIRECT

; 04. PikPak 专属组 (提至 04 顺位，正则 .* 确保显示所有节点)
custom_proxy_group=PikPak`select`.*`proxy`autotest`failover`DIRECT

; 05+. 地区组 (修复了正则语法错误，并全部追加 DIRECT 防止断流闪退)
custom_proxy_group=HK`url-test`(香港|HK|Hong Kong|🇭🇰)`https://www.gstatic.com/generate_204`600`100`DIRECT
custom_proxy_group=SG`url-test`(新加坡|SG|Singapore|🇸🇬)`https://www.gstatic.com/generate_204`600`100`DIRECT
custom_proxy_group=JP`url-test`(日本|JP|Japan|🇯🇵)`https://www.gstatic.com/generate_204`600`100`DIRECT
custom_proxy_group=US`url-test`(美国|US|United States|🇺🇸)`https://www.gstatic.com/generate_204`600`100`DIRECT
custom_proxy_group=TW`url-test`(台湾|TW|Tai Wan|🇹🇼)`https://www.gstatic.com/generate_204`600`100`DIRECT
custom_proxy_group=Other`url-test`^(?!.*(香港|HK|新加坡|SG|日本|JP|美国|US|台湾|TW)).*`https://www.gstatic.com/generate_204`600`100`DIRECT

; 杂项控制组
custom_proxy_group=direct`select`DIRECT
custom_proxy_group=reject`select`REJECT`DIRECT
custom_proxy_group=catchall`select`proxy`autotest`DIRECT
custom_proxy_group=GLOBAL`select`DIRECT`proxy`autotest

; ==========================================
; 路由规则定义
; ==========================================

; WebRTC 与 QUIC 拦截
rule=DOMAIN-KEYWORD,stun,reject
rule=DOMAIN-KEYWORD,turn,reject
rule=AND,((NETWORK,UDP),(DST-PORT,19302)),reject
rule=AND,((NETWORK,UDP),(DST-PORT,443),(GEOIP,!CN)),reject

; PikPak 进程路由
rule=PROCESS-NAME,PikPak.exe,PikPak
rule=PROCESS-NAME,com.pikpak.app,PikPak

; Telegram 流量归口 (删减繁琐的独立面板，统一走 proxy 即可)
rule=DOMAIN-SUFFIX,telegram.org,proxy
rule=DOMAIN-SUFFIX,telegram.me,proxy
rule=DOMAIN-KEYWORD,telegram,proxy
rule=IP-CIDR,91.108.0.0/16,proxy,no-resolve
rule=IP-CIDR,149.154.160.0/20,proxy,no-resolve
rule=IP-CIDR6,2001:67c:4e8::/48,proxy,no-resolve

; 直连与兜底规则
rule=GEOIP,CN,direct,no-resolve
rule=GEOIP,LAN,direct,no-resolve
rule=MATCH,catchall
