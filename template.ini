[custom]
; ==========================================
; 基础设置
; ==========================================
udp=true
tfo=true
sort=true
; 节点过滤
exclude_remarks=(官网|套餐|流量|异常|剩余|过期|失效|维护|高倍|倍率|测试|Test|备用|到期|0\.1x|内测|内网|loopback)

; ==========================================
; 策略组定义 (Proxy Groups)
; ✅ FIX: 移除 proxy 组中的 telegram/pikpak，防止循环引用
; ==========================================

; 1. 主策略组 (不再包含 telegram/pikpak)
custom_proxy_group=proxy`select`autotest`failover`HK`SG`JP`US`TW`Other`DIRECT

; 2. 自动测速与故障转移
custom_proxy_group=autotest`url-test`.*`https://www.gstatic.com/generate_204`180`30
custom_proxy_group=failover`fallback`.*`https://www.gstatic.com/generate_204`180`30

; 3. 地区自动优选
custom_proxy_group=HK`url-test`(香港|HK|Hong Kong|🇭🇰)`https://www.gstatic.com/generate_204`600`100
custom_proxy_group=SG`url-test`(新加坡|SG|Singapore|🇸🇬)`https://www.gstatic.com/generate_204`600`100
custom_proxy_group=JP`url-test`(日本|JP|Japan|🇯🇵)`https://www.gstatic.com/generate_204`600`100
custom_proxy_group=US`url-test`(美国|US|United States|🇺)`https://www.gstatic.com/generate_204`600`100
custom_proxy_group=TW`url-test`(台湾|TW|Tai Wan|🇹🇼)`https://www.gstatic.com/generate_204`600`100
custom_proxy_group=Other`url-test`^(?!.*(香港|HK|新加坡|SG|日本|JP|美国|US|台湾|TW)).*`https://www.gstatic.com/generate_204`600`100

; 4. 应用策略组 (它们引用 proxy，但 proxy 不引用它们 -> 单向依赖)
custom_proxy_group=telegram`select`proxy`HK`SG`JP`US`TW`Other`autotest`DIRECT
custom_proxy_group=pikpak`select`proxy`HK`SG`JP`US`TW`Other`autotest`DIRECT

; 5. 兜底策略组
custom_proxy_group=direct`select`DIRECT
custom_proxy_group=reject`select`REJECT`DIRECT
custom_proxy_group=catchall`select`proxy`autotest`DIRECT
custom_proxy_group=GLOBAL`select`DIRECT`proxy`autotest

; ==========================================
; 规则集 (Rule Providers)
; ==========================================
ruleset=reject,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt
ruleset=pikpak,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/pikpak.txt
ruleset=proxy,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/proxy.txt
ruleset=gfw,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/gfw.txt
ruleset=direct,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.txt
ruleset=lancidr,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/lancidr.txt
ruleset=cncidr,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/cncidr.txt

; ==========================================
; 自定义规则 (Rules)
; ==========================================
; WebRTC & QUIC 拦截
rule=DOMAIN-KEYWORD,stun,reject
rule=DOMAIN-KEYWORD,turn,reject
rule=AND,((NETWORK,UDP),(DST-PORT,19302)),reject
rule=AND,((NETWORK,UDP),(DST-PORT,443),(GEOIP,!CN)),reject

; Telegram 路由
rule=DOMAIN-SUFFIX,telegram.org,telegram
rule=DOMAIN-SUFFIX,telegram.me,telegram
rule=DOMAIN-KEYWORD,telegram,telegram
rule=IP-CIDR,91.108.0.0/16,telegram,no-resolve
rule=IP-CIDR,149.154.160.0/20,telegram,no-resolve
rule=IP-CIDR6,2001:67c:4e8::/48,telegram,no-resolve

; 规则集应用
rule=RULE-SET,reject,reject
rule=RULE-SET,pikpak,pikpak
rule=RULE-SET,proxy,proxy
rule=RULE-SET,gfw,proxy
rule=RULE-SET,direct,direct
rule=RULE-SET,lancidr,direct,no-resolve
rule=RULE-SET,cncidr,direct,no-resolve

; 兜底规则
rule=GEOIP,LAN,direct,no-resolve
rule=GEOIP,CN,direct,no-resolve
rule=MATCH,catchall
