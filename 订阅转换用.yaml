# Clash Meta YAML Template - v0.9.15 (Group Order Fixed)
# Static Equivalent of JS Override v0.9.15 | Dual-Stack + Process Routing
# Compatible with: Clash Verge Rev, Mihomo Party, FlClash (Mihomo >= 1.18.0)

mixed-port: 7890
allow-lan: true
mode: rule
log-level: info
ipv6: true
tcp-concurrent: true

dns:
  enable: true
  listen: 0.0.0.0:1055
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-ipv6: true
  fake-ip-range6: fdfe:dcba:9876::/64
  respect-rules: true
  fake-ip-filter:
    - '+.lan'
    - '+.local'
    - '+.msftconnecttest.com'
    - '+.msftncsi.com'
    - 'localhost.ptlogin2.qq.com'
    - 'time.*.com'
  default-nameserver: [223.5.5.5, 119.29.29.29, '2400:3200::1']
  nameserver: ['https://1.1.1.1/dns-query', 'https://8.8.4.4/dns-query']
  proxy-server-nameserver: ['https://223.5.5.5/dns-query', 'https://doh.pub/dns-query']
  direct-nameserver: ['https://223.5.5.5/dns-query', 'https://doh.pub/dns-query']
  direct-nameserver-follow-policy: true
  fallback: ['https://1.1.1.1/dns-query', 'https://8.8.4.4/dns-query']
  fallback-filter: { geoip: true, geoip-code: CN }
  nameserver-policy:
    'geosite:cn,private': ['https://223.5.5.5/dns-query', 'https://doh.pub/dns-query']
    'geosite:geolocation-!cn': ['https://1.1.1.1/dns-query', 'https://8.8.4.4/dns-query']

tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
  dns-hijack: ['0.0.0.0:53']
  strict-route: true
  mtu: 1500

sniffer:
  enable: true
  parse-pure-ip: false
  force-dns-mapping: true
  sniff:
    TLS: { ports: [443, 8443], override-destination: true }
    HTTP: { ports: [80, 8080, 8443], override-destination: true }
    QUIC: { ports: [443, 8443] }

proxies: []

rule-providers:
  reject: { type: http, behavior: domain, format: yaml, interval: 86400, url: 'https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt' }
  pikpak: { type: http, behavior: domain, format: yaml, interval: 86400, url: 'https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/pikpak.txt' }
  proxy:  { type: http, behavior: domain, format: yaml, interval: 86400, url: 'https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/proxy.txt' }
  direct: { type: http, behavior: domain, format: yaml, interval: 86400, url: 'https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.txt' }
  gfw:    { type: http, behavior: domain, format: yaml, interval: 86400, url: 'https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/gfw.txt' }
  cncidr: { type: http, behavior: ipcidr, format: yaml, interval: 86400, url: 'https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/cncidr.txt' }
  lancidr:{ type: http, behavior: ipcidr, format: yaml, interval: 86400, url: 'https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/lancidr.txt' }

proxy-groups:
  # 1. Global Entry (Unshifted to top)
  - name: 节点选择
    type: select
    include-all: true
    filter: '^(?!.*(官网|套餐|流量|异常|剩余|过期|失效|维护|高倍|倍率|测试|Test|备用)).*$'
    proxies: [延迟选优, 故障转移, 新加坡-自动, 香港-自动, 日本-自动, 美国-自动, 台湾-自动, 其他地区, DIRECT]

  # 2. Test & Fallback
  - name: 延迟选优
    type: url-test
    url: 'https://www.gstatic.com/generate_204'
    interval: 300
    timeout: 5000
    tolerance: 200
    lazy: true
    max-failed-times: 5
    include-all: true
    filter: '^(?!.*(官网|套餐|流量|异常|剩余|过期|失效|维护|高倍|倍率|测试|Test|备用)).*$'

  - name: 故障转移
    type: fallback
    url: 'https://www.gstatic.com/generate_204'
    interval: 300
    timeout: 5000
    lazy: true
    max-failed-times: 5
    include-all: true
    filter: '^(?!.*(官网|套餐|流量|异常|剩余|过期|失效|维护|高倍|倍率|测试|Test|备用)).*$'

  # 3. App Routing Groups (Placed BEFORE Regional Groups)
  - name: Telegram
    type: select
    include-all: true
    filter: '^(?!.*(官网|套餐|流量|异常|剩余|过期|失效|维护|高倍|倍率|测试|Test|备用)).*$'
    proxies: [新加坡-自动, 香港-自动, 日本-自动, 美国-自动, 台湾-自动, 其他地区, 节点选择, DIRECT]

  - name: PikPak
    type: select
    include-all: true
    filter: '^(?!.*(官网|套餐|流量|异常|剩余|过期|失效|维护|高倍|倍率|测试|Test|备用)).*$'
    proxies: [新加坡-自动, 香港-自动, 日本-自动, 美国-自动, 台湾-自动, 其他地区, 节点选择, DIRECT]

  # 4. Regional Auto-Groups
  - name: 香港-自动
    type: url-test
    url: 'https://www.gstatic.com/generate_204'
    interval: 300
    timeout: 5000
    tolerance: 200
    lazy: true
    max-failed-times: 5
    include-all: true
    filter: '(?=.*(香港|HK|Hong Kong|🇭🇰)).*$'

  - name: 美国-自动
    type: url-test
    url: 'https://www.gstatic.com/generate_204'
    interval: 300
    timeout: 5000
    tolerance: 200
    lazy: true
    max-failed-times: 5
    include-all: true
    filter: '(?=.*(美国|US|United States|🇺🇸)).*$'

  - name: 台湾-自动
    type: url-test
    url: 'https://www.gstatic.com/generate_204'
    interval: 300
    timeout: 5000
    tolerance: 200
    lazy: true
    max-failed-times: 5
    include-all: true
    filter: '(?=.*(台湾|TW|Tai Wan|🇹🇼)).*$'

  - name: 日本-自动
    type: url-test
    url: 'https://www.gstatic.com/generate_204'
    interval: 300
    timeout: 5000
    tolerance: 200
    lazy: true
    max-failed-times: 5
    include-all: true
    filter: '(?=.*(日本|JP|Japan|🇯🇵)).*$'

  - name: 新加坡-自动
    type: url-test
    url: 'https://www.gstatic.com/generate_204'
    interval: 300
    timeout: 5000
    tolerance: 200
    lazy: true
    max-failed-times: 5
    include-all: true
    filter: '(?=.*(新加坡|SG|Singapore|🇸🇬)).*$'

  - name: 其他地区
    type: url-test
    url: 'https://www.gstatic.com/generate_204'
    interval: 300
    timeout: 5000
    tolerance: 200
    lazy: true
    max-failed-times: 5
    include-all: true
    filter: '^(?!.*(香港|HK|Hong Kong|🇭🇰|美国|US|United States|🇺🇸|台湾|TW|Tai Wan|🇹🇼|日本|JP|Japan|🇯🇵|新加坡|SG|Singapore|🇸🇬|官网|套餐|流量|异常|剩余|过期|失效|维护|高倍|倍率|测试|Test|备用)).*$'

  # 5. System Controls
  - name: 全局直连
    type: select
    proxies: [DIRECT, 节点选择]
  - name: 全局拦截
    type: select
    proxies: [REJECT, DIRECT]
  - name: 漏网之鱼
    type: select
    proxies: [节点选择, 延迟选优, 全局直连]

rules:
  - 'AND,((NETWORK,UDP),(DST-PORT,443),(GEOIP,!CN)),REJECT'
  - 'PROCESS-NAME,Telegram.exe,Telegram'
  - 'PROCESS-NAME,Updater.exe,Telegram'
  - 'PROCESS-NAME,PikPak.exe,PikPak'
  - 'PROCESS-NAME,com.pikpak.app,PikPak'
  - 'RULE-SET,reject,全局拦截'
  - 'RULE-SET,pikpak,PikPak'
  - 'DOMAIN-SUFFIX,telegram.org,Telegram'
  - 'DOMAIN-SUFFIX,telegram.me,Telegram'
  - 'DOMAIN-KEYWORD,telegram,Telegram'
  - 'IP-CIDR,91.108.0.0/16,Telegram,no-resolve'
  - 'IP-CIDR,149.154.160.0/20,Telegram,no-resolve'
  - 'IP-CIDR6,2001:67c:4e8::/48,Telegram,no-resolve'
  - 'RULE-SET,proxy,节点选择'
  - 'RULE-SET,gfw,节点选择'
  - 'RULE-SET,direct,全局直连'
  - 'RULE-SET,lancidr,全局直连,no-resolve'
  - 'RULE-SET,cncidr,全局直连,no-resolve'
  - 'GEOIP,LAN,全局直连,no-resolve'
  - 'GEOIP,CN,全局直连,no-resolve'
  - 'MATCH,漏网之鱼'
