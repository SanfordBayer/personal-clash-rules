# Mihomo/Clash Meta Template - v0.7.0
# Optimized for subscription converters (target: clash.meta)
# Compatible with: Clash Verge Rev, Mihomo Party, FlClash

mixed-port: 7890
allow-lan: true
bind-address: '*'
mode: rule
log-level: info
ipv6: true
tcp-concurrent: true

dns:
  enable: true
  listen: 0.0.0.0:1054
  ipv6: true
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  fake-ip-ipv6: true
  respect-rules: true
  fake-ip-filter:
    - '+.lan'
    - '+.local'
    - '+.msftconnecttest.com'
    - '+.msftncsi.com'
    - 'localhost.ptlogin2.qq.com'
    - 'time.*.com'
  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29
    - '2400:3200::1'
  nameserver:
    - 'https://1.1.1.1/dns-query'
    - 'https://8.8.4.4/dns-query'
  proxy-server-nameserver:
    - 'https://223.5.5.5/dns-query'
    - 'https://doh.pub/dns-query'
  nameserver-policy:
    'geosite:cn,private':
      - 'https://223.5.5.5/dns-query'
      - 'https://doh.pub/dns-query'
    'geosite:geolocation-!cn':
      - 'https://1.1.1.1/dns-query'
      - 'https://8.8.4.4/dns-query'

tun:
  enable: true
  stack: system
  auto-route: true
  auto-detect-interface: true
  dns-hijack:
    - 'any:53'
  strict-route: true
  mtu: 1500

sniffer:
  enable: true
  parse-pure-ip: true
  force-dns-mapping: true
  sniff:
    TLS:
      ports: [443, 8443]
      override-destination: true
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
    QUIC:
      ports: [443, 8443]

proxies: []

proxy-groups:
  - name: 节点选择
    type: select
    include-all: true
    filter: '^(?!.*(官网|套餐|流量|异常|剩余|过期|失效|维护)).*$'
    proxies: [延迟选优, 故障转移, 香港-自动, 美国-自动, 台湾-自动, 日本-自动, 新加坡-自动, 其他地区, DIRECT]
  - name: 延迟选优
    type: url-test
    include-all: true
    filter: '^(?!.*(官网|套餐|流量|异常|剩余|过期|失效|维护)).*$'
    url: https://www.google.com/generate_204
    interval: 300
    tolerance: 150
    timeout: 3000
  - name: 故障转移
    type: fallback
    include-all: true
    filter: '^(?!.*(官网|套餐|流量|异常|剩余|过期|失效|维护)).*$'
    url: https://www.google.com/generate_204
    interval: 300
    timeout: 3000
  - name: PikPak
    type: select
    include-all: true
    filter: '^(?!.*(官网|套餐|流量|异常|剩余|过期|失效|维护)).*$'
    proxies: [新加坡-自动, 节点选择, 延迟选优, 故障转移, 香港-自动, 美国-自动, 台湾-自动, 日本-自动, 其他地区, DIRECT]
  - name: 香港-自动
    type: url-test
    include-all: true
    filter: '(?=.*(香港|HK|Hong Kong|🇭🇰)).*$'
    url: https://www.google.com/generate_204
    interval: 300
    tolerance: 150
    timeout: 3000
  - name: 美国-自动
    type: url-test
    include-all: true
    filter: '(?=.*(美国|US|United States|🇺🇸)).*$'
    url: https://www.google.com/generate_204
    interval: 300
    tolerance: 150
    timeout: 3000
  - name: 台湾-自动
    type: url-test
    include-all: true
    filter: '(?=.*(台湾|TW|Tai Wan|🇹🇼)).*$'
    url: https://www.google.com/generate_204
    interval: 300
    tolerance: 150
    timeout: 3000
  - name: 日本-自动
    type: url-test
    include-all: true
    filter: '(?=.*(日本|JP|Japan|🇯🇵)).*$'
    url: https://www.google.com/generate_204
    interval: 300
    tolerance: 150
    timeout: 3000
  - name: 新加坡-自动
    type: url-test
    include-all: true
    filter: '(?=.*(新加坡|SG|Singapore|🇸🇬)).*$'
    url: https://www.google.com/generate_204
    interval: 300
    tolerance: 150
    timeout: 3000
  - name: 其他地区
    type: url-test
    include-all: true
    filter: '^(?!.*(香港|HK|Hong Kong|🇭🇰|美国|US|United States|🇺🇸|台湾|TW|Tai Wan|🇹🇼|日本|JP|Japan|🇯🇵|新加坡|SG|Singapore|🇸🇬|官网|套餐|流量|异常|剩余|过期|失效|维护)).*$'
    url: https://www.google.com/generate_204
    interval: 300
    tolerance: 150
    timeout: 3000
  - name: 全局直连
    type: select
    proxies: [DIRECT, 节点选择]
  - name: 全局拦截
    type: select
    proxies: [REJECT, DIRECT]
  - name: 漏网之鱼
    type: select
    proxies: [节点选择, 延迟选优, 全局直连]

rule-providers:
  reject:
    type: http
    behavior: domain
    url: https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.txt
    interval: 86400
    format: yaml
  pikpak:
    type: http
    behavior: domain
    url: https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/pikpak.txt
    interval: 86400
    format: yaml
  proxy:
    type: http
    behavior: domain
    url: https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/proxy.txt
    interval: 86400
    format: yaml
  direct:
    type: http
    behavior: domain
    url: https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.txt
    interval: 86400
    format: yaml
  gfw:
    type: http
    behavior: domain
    url: https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/gfw.txt
    interval: 86400
    format: yaml
  cncidr:
    type: http
    behavior: ipcidr
    url: https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/cncidr.txt
    interval: 86400
    format: yaml
  lancidr:
    type: http
    behavior: ipcidr
    url: https://fastly.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/lancidr.txt
    interval: 86400
    format: yaml

rules:
  - RULE-SET,reject,全局拦截
  - RULE-SET,pikpak,PikPak
  - RULE-SET,proxy,节点选择
  - RULE-SET,gfw,节点选择
  - RULE-SET,direct,全局直连
  - RULE-SET,lancidr,全局直连,no-resolve
  - RULE-SET,cncidr,全局直连,no-resolve
  - IP-CIDR6,::1/128,DIRECT,no-resolve
  - IP-CIDR6,fc00::/7,DIRECT,no-resolve
  - IP-CIDR6,fe80::/10,DIRECT,no-resolve
  - GEOIP,LAN,全局直连,no-resolve
  - GEOIP,CN,全局直连,no-resolve
  - MATCH,漏网之鱼
