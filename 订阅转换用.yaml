# ---------------------------------------------------
# Clash 订阅转换自定义远程配置 (v0.4)
# 更新说明：新增 Pikpak 专属规则，新加坡节点优先
# ---------------------------------------------------

# 1. DNS 设置
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  respect-rules: true
  fake-ip-filter:
    - "+.lan"
    - "+.local"
    - "+.msftconnecttest.com"
    - "+.msftncsi.com"
    - "time.*.com"
  default-nameserver: [223.5.5.5, 119.29.29.29]
  nameserver:
    - 'https://1.1.1.1/dns-query'
    - 'https://8.8.4.4/dns-query'
  proxy-server-nameserver:
    - 'https://223.5.5.5/dns-query'
  nameserver-policy:
    'geosite:private,cn': [https://223.5.5.5/dns-query, https://doh.pub/dns-query]

# 2. 代理组配置
proxy-groups:
  - name: 节点选择
    type: select
    proxies:
      - 延迟选优
      - 故障转移
      - 香港-自动
      - 美国-自动
      - 台湾-自动
      - 日本-自动
      - 新加坡-自动
      - 其他地区
      - DIRECT

  # 【新增】Pikpak 专属组：新加坡优先逻辑
  - name: Pikpak
    type: select
    include-all: true
    filter: "^(?!.*(官网|套餐|流量|异常|剩余)).*$"
    proxies:
      - 新加坡-自动
      - 节点选择
      - 延迟选优
      - 故障转移
      - 香港-自动
      - 美国-自动
      - 台湾-自动
      - 日本-自动
      - 其他地区
      - DIRECT

  - name: 延迟选优
    type: url-test
    url: http://www.gstatic.com/generate_204
    interval: 300
    tolerance: 100
    include-all: true
    filter: "^(?!.*(官网|套餐|流量|异常|剩余)).*$"

  - name: 故障转移
    type: fallback
    url: http://www.gstatic.com/generate_204
    interval: 300
    include-all: true

  # --- 地区自动选择组 ---
