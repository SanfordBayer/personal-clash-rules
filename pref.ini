[custom]
; ==========================================
; 基础配置文件 (必须包含 DNS/TUN/Sniffer 设置)
; 请将下方提供的 base.yml 上传后，替换此 URL
; ==========================================
clash_rule_base=https://raw.githubusercontent.com/SanfordBayer/personal-clash-rules/refs/heads/main/base.yml

; ==========================================
; 节点过滤 (合并了 FILTER_KEYWORDS 和 EXCLUDE_KEYWORDS)
; ==========================================
exclude_remarks=(官网|套餐|流量|异常|剩余|过期|失效|维护|高倍|倍率|测试|Test|备用|到期|0\\.1x|内测|内网|loopback)

; ==========================================
; 策略组定义 (Proxy Groups)
; 格式: 组名`类型`节点正则`测试URL`测试间隔`超时时间`容差
; ==========================================

; 1-3. 核心选路组
custom_proxy_group=01 | Proxy`select`.*
custom_proxy_group=02 | AutoTest`url-test`.*`https://www.gstatic.com/generate_204`300`5000`200
custom_proxy_group=03 | FailOver`fallback`.*`https://www.gstatic.com/generate_204`300`5000`200

; 4. PikPak 专属组
; 注: subconverter 无法动态将 SG/Proxy 置顶，此处使用 select 包含所有节点，需在客户端手动拖动排序
custom_proxy_group=04 | PikPak`select`.*

; 5-10. 地区组 (使用 url-test 和正则过滤)
custom_proxy_group=05 | HK`url-test`(香港|HK|Hong Kong|🇭🇰)`https://www.gstatic.com/generate_204`300`5000`200
custom_proxy_group=06 | SG`url-test`(新加坡|SG|Singapore|🇸🇬)`https://www.gstatic.com/generate_204`300`5000`200
custom_proxy_group=07 | JP`url-test`(日本|JP|Japan|🇯🇵)`https://www.gstatic.com/generate_204`300`5000`200
custom_proxy_group=08 | US`url-test`(美国|US|United States|🇺🇸)`https://www.gstatic.com/generate_204`300`5000`200
custom_proxy_group=09 | TW`url-test`(台湾|TW|Tai Wan|🇹🇼)`https://www.gstatic.com/generate_204`300`5000`200
; Other 组：排除上述所有地区
custom_proxy_group=10 | Other`url-test`^(?!.*(香港|HK|Hong Kong|🇭🇰|新加坡|SG|Singapore|🇸🇬|日本|JP|Japan|🇯🇵|美国|US|United States|🇺🇸|台湾|TW|Tai Wan|🇹🇼)).*$`https://www.gstatic.com/generate_204`300`5000`200

; 11-14. 功能组
custom_proxy_group=11 | Direct`select`DIRECT
custom_proxy_group=12 | Reject`select`REJECT
custom_proxy_group=13 | CatchAll`select`.*
custom_proxy_group=14 | GLOBAL`select`.*

; ==========================================
; 规则集 (Rule Providers)
; 使用 Loyalsoldier 的 yaml 格式规则集
; ==========================================
ruleset=12 | Reject,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/reject.yaml
ruleset=04 | PikPak,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/pikpak.yaml
ruleset=01 | Proxy,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/proxy.yaml
ruleset=01 | Proxy,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/gfw.yaml
ruleset=11 | Direct,https://cdn.jsdelivr.net/gh/Loyalsoldier/clash-rules@release/direct.yaml

; ==========================================
; 自定义规则 (Rules)
; ==========================================
; 拦截海外 QUIC (UDP 443 且非 CN)
rules=AND,((NETWORK,UDP),(DST-PORT,443),(GEOIP,!CN)),REJECT
; 进程规则
rules=PROCESS-NAME,Telegram.exe,01 | Proxy
rules=PROCESS-NAME,PikPak.exe,04 | PikPak
; 域名和 IP 规则
rules=DOMAIN-KEYWORD,telegram,01 | Proxy
rules=IP-CIDR,91.108.0.0/16,01 | Proxy,no-resolve
; 局域网和国内 IP
rules=GEOIP,LAN,11 | Direct,no-resolve
rules=GEOIP,CN,11 | Direct,no-resolve
; 兜底规则
rules=MATCH,13 | CatchAll
